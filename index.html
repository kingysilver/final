<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Busan Food Portfolio</title>

<style>
html {
  scroll-behavior: smooth;
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #eaf7ff;
}

/* HERO (첫 화면) */
.hero {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  background: linear-gradient(135deg, #8fd3ff, #eaf7ff);
  color: white;
  padding: 40px;
}

.hero h1 {
  font-size: 60px;
  margin: 0;
  letter-spacing: 2px;
}

.hero p {
  font-size: 18px;
  margin-top: 15px;
  opacity: 0.9;
}

.scroll {
  position: absolute;
  bottom: 30px;
  font-size: 14px;
  opacity: 0.8;
}

/* NAV */
nav {
  position: fixed;
  top: 0;
  width: 100%;
  display: flex;
  justify-content: center;
  gap: 30px;
  padding: 15px;
  background: rgba(255,255,255,0.6);
  backdrop-filter: blur(10px);
}

nav a {
  text-decoration: none;
  color: #0077cc;
  font-weight: bold;
}

/* SECTION */
section {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: space-around;
  padding: 80px;
}

/* 배경 */
#poster { background: linear-gradient(120deg,#d9f3ff,#ffffff); }
#video { background: linear-gradient(120deg,#bfe9ff,#eaf7ff); }
#goods { background: linear-gradient(120deg,#a6ddff,#dff5ff); }

/* TEXT */
.text {
  width: 40%;
}

.text h1 {
  font-size: 48px;
}

.text p {
  color: #555;
}

/* MEDIA */
.media {
  width: 40%;
}

img, video {
  width: 100%;
  border-radius: 20px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.1);
}

/* 버튼 */
button {
  margin-top: 10px;
  padding: 10px 18px;
  border: none;
  border-radius: 30px;
  background: #0099ff;
  color: white;
  cursor: pointer;
}
</style>
</head>

<body>

<!-- HERO INTRO -->
<div class="hero">
  <h1>부산 맛집 홍보 기획 포트폴리오</h1>
  <p>AI 이미지·영상 크리에이션</p>
  <div class="scroll">↓ Scroll Down</div>
</div>

<!-- NAV -->
<nav>
  <a href="#poster">Poster</a>
  <a href="#video">Video</a>
  <a href="#goods">Goods</a>
</nav>

<!-- POSTER -->
<section id="poster">
  <div class="text">
    <h1>Poster Design</h1>
    <p>부산 맛집을 시각적으로 표현한 포스터</p>
  </div>
  <div class="media">
    <img src="images/poster.jpg">
  </div>
</section>

<!-- VIDEO -->
<section id="video">
  <div class="text">
    <h1>Promo Video</h1>
    <p>AI 기반 홍보 영상 제작</p>
  </div>

  <div class="media">
    <video id="vid">
      <source src="video/promo.mp4">
    </video>
    <button onclick="toggleVideo()">▶ Play / Pause</button>
  </div>
</section>

<!-- GOODS -->
<section id="goods">
  <div class="text">
    <h1>Goods Design</h1>
    <p>브랜드 굿즈 디자인</p>
  </div>
  <div class="media">
    <img src="images/goods.jpg">
  </div>
</section>

<script>
const video = document.getElementById("vid");

function toggleVideo(){
  if(video.paused){
    video.play();
  } else {
    video.pause();
  }
}
</script>

</body>
</html>
