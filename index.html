<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Food Portfolio</title>

<style>
html {
  scroll-behavior: smooth;
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #eaf7ff;
}

/* NAV BAR */
nav {
  position: fixed;
  top: 0;
  width: 100%;
  display: flex;
  justify-content: center;
  gap: 30px;
  padding: 15px;
  background: rgba(255,255,255,0.7);
  backdrop-filter: blur(10px);
  z-index: 10;
}

nav a {
  text-decoration: none;
  color: #0077cc;
  font-weight: bold;
}

/* SECTION */
section {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: space-around;
  padding: 80px;
}

/* 배경 */
#poster { background: linear-gradient(120deg,#d9f3ff,#ffffff); }
#video { background: linear-gradient(120deg,#bfe9ff,#eaf7ff); }
#goods { background: linear-gradient(120deg,#a6ddff,#dff5ff); }

/* 텍스트 */
.text {
  width: 40%;
}

.text h1 {
  font-size: 50px;
  margin-bottom: 10px;
}

.text p {
  color: #555;
}

/* 미디어 */
.media {
  width: 40%;
}

img, video {
  width: 100%;
  border-radius: 20px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.1);
}

/* 버튼 */
button {
  margin-top: 10px;
  padding: 10px 18px;
  border: none;
  border-radius: 30px;
  background: #0099ff;
  color: white;
  cursor: pointer;
}

/* TOP BUTTON */
.top {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #0077cc;
  color: white;
  border: none;
  padding: 12px 15px;
  border-radius: 50%;
  cursor: pointer;
}
</style>
</head>

<body>

<!-- NAV -->
<nav>
  <a href="#poster">Poster</a>
  <a href="#video">Video</a>
  <a href="#goods">Goods</a>
</nav>

<!-- POSTER -->
<section id="poster">
  <div class="text">
    <h1>Poster Design</h1>
    <p>하늘빛 감성 맛집 포스터</p>
  </div>
  <div class="media">
    <!-- 🔥 여기만 네 이미지로 교체 -->
    <img src="images/poster.jpg">
  </div>
</section>

<!-- VIDEO -->
<section id="video">
  <div class="text">
    <h1>Promo Video</h1>
    <p>브랜드 홍보 영상</p>
  </div>

  <div class="media">
    <!-- 🔥 여기 영상 교체 -->
    <video id="vid">
      <source src="video/promo.mp4">
    </video>
    <button onclick="toggleVideo()">▶ Play / Pause</button>
  </div>
</section>

<!-- GOODS -->
<section id="goods">
  <div class="text">
    <h1>Goods Design</h1>
    <p>브랜드 굿즈 디자인</p>
  </div>
  <div class="media">
    <img src="images/goods.jpg">
  </div>
</section>

<!-- TOP -->
<button class="top" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>

<script>
const video = document.getElementById("vid");

function toggleVideo(){
  if(video.paused){
    video.play();
  } else {
    video.pause();
  }
}
</script>

</body>
</html>
