<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Busan Food Portfolio</title>

<style>
:root {
  --main: #FC8A36;
  --light: #FFD3B3;
  --cream: #FFF3EC;
  --deep: #E86F20;
}

html { scroll-behavior: smooth; }

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: var(--cream);
}

/* NAV */
nav {
  position: fixed;
  top: 0;
  width: 100%;
  display: flex;
  justify-content: center;
  gap: 30px;
  padding: 15px;
  background: rgba(255,255,255,0.8);
  backdrop-filter: blur(10px);
  z-index: 10;
}

nav a {
  text-decoration: none;
  color: var(--main);
  font-weight: bold;
}

/* HERO */
.hero {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  background: linear-gradient(135deg, var(--main), var(--light), var(--cream));
  color: white;
}

.hero h1 { font-size: 56px; margin: 0; }
.hero p { font-size: 18px; margin-top: 10px; }

/* SECTION */
section {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: space-around;
  padding: 80px;
}

/* BACKGROUNDS */
#poster { background: linear-gradient(120deg, #FFF3EC, #FFFFFF); }
#video { background: linear-gradient(120deg, #FFD3B3, #FFF7F2); }
#goods { background: linear-gradient(120deg, var(--main), var(--cream)); }

/* TEXT */
.text { width: 40%; }
.text h1 { font-size: 48px; color: var(--main); }
.text p { color: #666; }

/* MEDIA */
.media { width: 40%; }

img {
  width: 100%;
  border-radius: 20px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.12);
}

/* VIDEO THUMB */
.thumb {
  position: relative;
  border-radius: 20px;
  overflow: hidden;
  cursor: pointer;
}

.thumb img { width: 100%; }

.play {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%,-50%);
  width: 80px;
  height: 80px;
  border-radius: 50%;
  background: rgba(252,138,54,0.9);
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 40px;
}

/* GOODS */
.goods-wrap {
  display: flex;
  flex-direction: column;
  gap: 20px;
  width: 40%;
}

.goods-card {
  background: white;
  padding: 15px;
  border-radius: 20px;
  box-shadow: 0 15px 30px rgba(0,0,0,0.1);
  text-align: center;
}

.goods-card img {
  width: 100%;
  border-radius: 15px;
}

.img-row {
  display: flex;
  gap: 10px;
}

.img-row img {
  width: 50%;
  border-radius: 12px;
}

.goods-card h2 {
  font-size: 18px;
  color: var(--main);
}

.price {
  color: #666;
  font-weight: bold;
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
  <h1>부산 맛집 홍보 기획 포트폴리오</h1>
  <p>AI 이미지 · 영상 크리에이션</p>
</div>

<!-- NAV -->
<nav>
  <a href="#poster">Poster</a>
  <a href="#video">Video</a>
  <a href="#goods">Goods</a>
</nav>

<!-- POSTER -->
<section id="poster">
  <div class="text">
    <h1>Poster Design</h1>
    <p>톤쇼우 광안점</p>
  </div>
  <div class="media">
    <img src="image/https://github.com/kingysilver/final/blob/c27dd841f5c9c583efd04773390f8cab5795d593/image/ai%20%ED%8F%AC%EC%8A%A4%ED%84%B0.png">
  </div>
</section>

<!-- VIDEO -->
<section id="video">
  <div class="text">
    <h1>Promo Video</h1>
    <p>유튜브 영상 링크</p>
  </div>

  <div class="media">
    <a href="https://youtube.com/shorts/h1Kfea8O0Lo?feature=share" target="_blank">
      <div class="thumb">
        <img src="image/https://github.com/kingysilver/final/blob/c27dd841f5c9c583efd04773390f8cab5795d593/image/%EC%8A%A4%ED%81%AC%EB%A6%B0%EC%83%B7%202026-06-19%20090842.png">
        <div class="play">▶</div>
      </div>
    </a>
  </div>
</section>

<!-- GOODS -->
<section id="goods">
  <div class="text">
    <h1>Goods Design</h1>
    <p>톤쇼우 광안점 굿즈 기획</p>
  </div>

  <div class="media goods-wrap">

    <!-- 1번 (2개) -->
    <div class="goods-card">
      <div class="img-row">
        <img src="image/https://github.com/kingysilver/final/blob/c27dd841f5c9c583efd04773390f8cab5795d593/image/Firefly_Gemini%20Flash_A%20high-end%20product%20photography%20shot%20of%20a%20single%20keycap%20keychain%20shaped%20like%20a%20crispy%20%2036104.png">
        <img src="image/https://github.com/kingysilver/final/blob/c27dd841f5c9c583efd04773390f8cab5795d593/image/Firefly_Gemini%20Flash_A%20high-end%20product%20photography%20shot%20of%20a%20single%20keycap%20keychain%20shaped%20like%20a%20crispy%20%20322211.png">
      </div>
      <h2>돈카츠 키캡 키링</h2>
      <p class="price">15,000원</p>
    </div>

    <!-- 2번 -->
    <div class="goods-card">
      <img src="image/https://github.com/kingysilver/final/blob/c27dd841f5c9c583efd04773390f8cab5795d593/image/Soy%20Sauce%20Keychain.png">
      <h2>돈카츠 소스 미니 키링</h2>
      <p class="price">10,000원</p>
    </div>

    <!-- 3번 -->
    <div class="goods-card">
      <img src="image/https://github.com/kingysilver/final/blob/b69b4adfc9e9a0fa5ad64f68e77468a7d4280997/Firefly_Gemini%20Flash_A%20high-end%20lifestyle%20product%20photography%20shot%20showing%20a%20person%E2%80%99s%20hands%20squeezing%20and%20%2036104.png">
      <h2>돈카츠 스퀴시</h2>
      <p class="price">7,000원</p>
    </div>

  </div>
</section>

</body>
</html>
