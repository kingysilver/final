<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Busan Food Portfolio</title>

<style>
:root {
  --main: #FC8A36;
  --light: #FFD3B3;
  --cream: #FFF3EC;
  --deep: #E86F20;
}

html {
  scroll-behavior: smooth;
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: var(--cream);
}

/* NAV */
nav {
  position: fixed;
  top: 0;
  width: 100%;
  display: flex;
  justify-content: center;
  gap: 30px;
  padding: 15px;
  background: rgba(255,255,255,0.8);
  backdrop-filter: blur(10px);
  z-index: 10;
}

nav a {
  text-decoration: none;
  color: var(--main);
  font-weight: bold;
}

/* HERO */
.hero {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;

  background: linear-gradient(135deg, var(--main), var(--light), var(--cream)) !important;
  color: white;
}

.hero h1 {
  font-size: 58px;
  margin: 0;
}

.hero p {
  font-size: 18px;
  margin-top: 10px;
}

.scroll {
  position: absolute;
  bottom: 25px;
  opacity: 0.8;
}

/* SECTION */
section {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: space-around;
  padding: 80px;
}

/* BACKGROUNDS (강제 적용) */
#poster {
  background: linear-gradient(120deg, #FFF3EC, #FFFFFF) !important;
}

#video {
  background: linear-gradient(120deg, #FFD3B3, #FFF7F2) !important;
}

#goods {
  background: linear-gradient(120deg, var(--main), var(--cream)) !important;
}

/* TEXT */
.text {
  width: 40%;
}

.text h1 {
  font-size: 48px;
  color: var(--main);
}

.text p {
  color: #666;
}

/* MEDIA */
.media {
  width: 40%;
}

img, video {
  width: 100%;
  border-radius: 20px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.12);
}

/* BUTTON */
button {
  margin-top: 10px;
  padding: 10px 18px;
  border: none;
  border-radius: 30px;
  background: var(--main);
  color: white;
  cursor: pointer;
}

button:hover {
  background: var(--deep);
}

/* FIX: 캐시 대응용 강제 렌더 */
.hero, #poster, #video, #goods {
  will-change: transform;
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
  <h1>부산 맛집 홍보 기획 포트폴리오</h1>
  <p>AI 이미지·영상 크리에이션</p>
  <div class="scroll">↓ Scroll Down</div>
</div>

<!-- NAV -->
<nav>
  <a href="#poster">Poster</a>
  <a href="#video">Video</a>
  <a href="#goods">Goods</a>
</nav>

<!-- POSTER -->
<section id="poster">
  <div class="text">
    <h1>Poster Design</h1>
    <p>부산 감성을 담은 맛집 포스터</p>
  </div>
  <div class="media">
    <img src="images/poster.jpg">
  </div>
</section>

<!-- VIDEO -->
<section id="video">
  <div class="text">
    <h1>Promo Video</h1>
    <p>AI 기반 홍보 영상</p>
  </div>

  <div class="media">
    <video id="vid">
      <source src="video/promo.mp4">
    </video>
    <button onclick="toggleVideo()">▶ Play / Pause</button>
  </div>
</section>

<!-- GOODS -->
<section id="goods">
  <div class="text">
    <h1>Goods Design</h1>
    <p>브랜드 굿즈 디자인</p>
  </div>
  <div class="media">
    <img src="images/goods.jpg">
  </div>
</section>

<script>
const video = document.getElementById("vid");

function toggleVideo(){
  if(video.paused){
    video.play();
  } else {
    video.pause();
  }
}
</script>

</body>
</html>
