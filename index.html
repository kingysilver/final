<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Busan Food Portfolio</title>

<style>
html {
  scroll-behavior: smooth;
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #fff7f2;
  color: #333;
}

/* HERO */
.hero {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;

  /* 🔥 여러 오렌지 톤 섞기 */
  background: radial-gradient(circle at top, #FC8A36, #FFD3B3, #FFF3EC);
  color: white;
  position: relative;
}

.hero h1 {
  font-size: 58px;
  margin: 0;
  letter-spacing: 1px;
}

.hero p {
  font-size: 18px;
  margin-top: 15px;
  opacity: 0.95;
  color: #fff;
}

.scroll {
  position: absolute;
  bottom: 30px;
  font-size: 14px;
  opacity: 0.8;
}

/* NAV */
nav {
  position: fixed;
  top: 0;
  width: 100%;
  display: flex;
  justify-content: center;
  gap: 30px;
  padding: 15px;

  background: rgba(255, 243, 236, 0.7);
  backdrop-filter: blur(10px);
}

nav a {
  text-decoration: none;
  color: #FC8A36;
  font-weight: bold;
  transition: 0.3s;
}

nav a:hover {
  color: #E86F20;
}

/* SECTION */
section {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: space-around;
  padding: 80px;
}

/* POSTER */
#poster {
  background: linear-gradient(120deg, #FFF3EC, #FFFFFF);
}

/* VIDEO */
#video {
  background: linear-gradient(120deg, #FFD3B3, #FFF7F2);
}

/* GOODS */
#goods {
  background: linear-gradient(120deg, #FC8A36, #FFF3EC);
}

/* TEXT */
.text {
  width: 40%;
}

.text h1 {
  font-size: 48px;
  color: #FC8A36;
  margin-bottom: 10px;
}

.text p {
  color: #666;
  line-height: 1.6;
}

/* MEDIA */
.media {
  width: 40%;
}

img, video {
  width: 100%;
  border-radius: 20px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.12);
  transition: transform 0.3s ease;
}

img:hover, video:hover {
  transform: scale(1.02);
}

/* BUTTON */
button {
  margin-top: 10px;
  padding: 10px 18px;
  border: none;
  border-radius: 30px;

  background: linear-gradient(135deg, #FC8A36, #E86F20);
  color: white;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  opacity: 0.9;
  transform: translateY(-2px);
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
  <h1>부산 맛집 홍보 기획 포트폴리오</h1>
  <p>AI 이미지·영상 크리에이션</p>
  <div class="scroll">↓ Scroll to Explore</div>
</div>

<!-- NAV -->
<nav>
  <a href="#poster">Poster</a>
  <a href="#video">Video</a>
  <a href="#goods">Goods</a>
</nav>

<!-- POSTER -->
<section id="poster">
  <div class="text">
    <h1>Poster Design</h1>
    <p>부산의 감성을 담아 제작한 맛집 포스터 디자인</p>
  </div>
  <div class="media">
    <img src="images/poster.jpg">
  </div>
</section>

<!-- VIDEO -->
<section id="video">
  <div class="text">
    <h1>Promo Video</h1>
    <p>AI 기반으로 제작된 브랜드 홍보 영상</p>
  </div>

  <div class="media">
    <video id="vid">
      <source src="video/promo.mp4">
    </video>
    <button onclick="toggleVideo()">▶ Play / Pause</button>
  </div>
</section>

<!-- GOODS -->
<section id="goods">
  <div class="text">
    <h1>Goods Design</h1>
    <p>브랜드 아이덴티티를 확장한 굿즈 디자인</p>
  </div>
  <div class="media">
    <img src="images/goods.jpg">
  </div>
</section>

<script>
const video = document.getElementById("vid");

function toggleVideo(){
  if(video.paused){
    video.play();
  } else {
    video.pause();
  }
}
</script>

</body>
</html>
