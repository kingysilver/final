<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Busan Food Portfolio</title>

<style>
:root {
  --main: #FC8A36;
  --light: #FFD3B3;
  --cream: #FFF3EC;
  --deep: #E86F20;
}

html {
  scroll-behavior: smooth;
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: var(--cream);
}

/* NAV */
nav {
  position: fixed;
  top: 0;
  width: 100%;
  display: flex;
  justify-content: center;
  gap: 30px;
  padding: 15px;
  background: rgba(255,255,255,0.8);
  backdrop-filter: blur(10px);
  z-index: 10;
}

nav a {
  text-decoration: none;
  color: var(--main);
  font-weight: bold;
}

/* HERO */
.hero {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;

  background: linear-gradient(135deg, var(--main), var(--light), var(--cream));
  color: white;
  position: relative;
}

.hero h1 {
  font-size: 56px;
  margin: 0;
}

.hero p {
  font-size: 18px;
  margin-top: 10px;
  opacity: 0.95;
}

.scroll {
  position: absolute;
  bottom: 25px;
  font-size: 14px;
  opacity: 0.8;
}

/* SECTION */
section {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: space-around;
  padding: 80px;
}

/* BACKGROUNDS */
#poster {
  background: linear-gradient(120deg, #FFF3EC, #FFFFFF);
}

#video {
  background: linear-gradient(120deg, #FFD3B3, #FFF7F2);
}

#goods {
  background: linear-gradient(120deg, var(--main), var(--cream));
}

/* TEXT */
.text {
  width: 40%;
}

.text h1 {
  font-size: 48px;
  color: var(--main);
}

.text p {
  color: #666;
  line-height: 1.6;
}

/* MEDIA */
.media {
  width: 40%;
}

img {
  width: 100%;
  border-radius: 20px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.12);
}

/* VIDEO THUMB */
.thumb {
  position: relative;
  width: 100%;
  border-radius: 20px;
  overflow: hidden;
  cursor: pointer;
  box-shadow: 0 20px 40px rgba(0,0,0,0.15);
  transition: transform 0.3s ease;
}

.thumb:hover {
  transform: scale(1.02);
}

.thumb img {
  width: 100%;
  display: block;
}

/* PLAY BUTTON */
.play {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%,-50%);
  width: 80px;
  height: 80px;
  border-radius: 50%;
  background: rgba(252,138,54,0.9);
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 40px;
  font-weight: bold;
  transition: 0.3s;
}

.thumb:hover .play {
  background: var(--deep);
}

/* BUTTON */
button {
  margin-top: 10px;
  padding: 10px 18px;
  border: none;
  border-radius: 30px;
  background: var(--main);
  color: white;
  cursor: pointer;
}

button:hover {
  background: var(--deep);
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
  <h1>부산 맛집 홍보 기획 포트폴리오</h1>
  <p>AI 이미지 · 영상 크리에이션</p>
  <div class="scroll">↓ Scroll Down</div>
</div>

<!-- NAV -->
<nav>
  <a href="#poster">Poster</a>
  <a href="#video">Video</a>
  <a href="#goods">Goods</a>
</nav>

<!-- POSTER -->
<section id="poster">
  <div class="text">
    <h1>Poster Design</h1>
    <p>부산 감성을 담아 제작한 맛집 포스터</p>
  </div>

  <div class="media">
    <img src="images/poster.jpg">
  </div>
</section>

<!-- VIDEO (유튜브 썸네일 링크) -->
<section id="video">
  <div class="text">
    <h1>Promo Video</h1>
    <p>AI 기반 홍보 영상 제작</p>
  </div>

  <div class="media">
    <a href="https://www.youtube.com/watch?v=YOUR_VIDEO_ID" target="_blank">
      <div class="thumb">
        <img src="images/video_thumbnail.jpg">
        <div class="play">▶</div>
      </div>
    </a>
  </div>
</section>

<!-- GOODS -->
<section id="goods">
  <div class="text">
    <h1>Goods Design</h1>
    <p>브랜드 아이덴티티를 담은 굿즈 디자인</p>
  </div>

  <div class="media">
    <img src="images/goods.jpg">
  </div>
</section>

</body>
</html>
